<!DOCTYPE html>
<html>
    <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
      integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
      crossorigin="anonymous"
    />
    <link rel="shortcut icon" href="images (1) (1).jpg") }}" type="image/x-icon">
    <link rel="icon" href="images (1) (1).jpg") }}" type="image/x-icon">

    <title>{% block title %}Home{% endblock %}</title>
    <style>
      html {
        margin: 0;
        padding: 0;
      }
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("{{ url_for('static', filename='Cathedral-Basilica-of-St.-Louis-01.jpg') }}") no-repeat center center fixed;
        background-size: cover;
      }
      .navbar-custom {
        background-color: rgba(0, 0, 0, 0.4) !important;
        backdrop-filter: blur(4px);
        z-index: 10;
      }
      .navbar-custom .navbar-brand {
        color: #fff;
        font-weight: bold;
      }
      .navbar-custom .nav-link {
        color: #fff !important;
      }
      .navbar-custom .nav-link:hover {
        color: #ffd700 !important;
      }
      .navbar > .container-fluid {
        padding-left: 0;
        padding-right: 0;
      }
      .navbar-collapse {
        flex-grow: 0;
        margin-left: auto;
      }
      .search-wrapper {
        display: flex;
        align-items: center;
      }
      .search-icon {
        color: #fff;
        font-size: 1.2rem;
        cursor: pointer;
        padding: 0 10px;
      }
      .search-icon:hover {
        color: #ffd700;
      }
      .search-input {
        width: 0;
        padding: 0;
        border: none;
        transition: width 0.3s ease, padding 0.3s ease;
        overflow: hidden;
        background: transparent;
        color: #fff;
        border-bottom: 1px solid #fff;
        outline: none;
      }
      .search-input.open {
        width: 180px;
        padding: 4px 8px;
      }
      .search-input::placeholder {
        color: rgba(255,255,255,0.7);
      }

      @media (max-width: 768px) {
        .navbar-brand img {
          height: 24px !important;
        }
        .search-input.open {
          width: 120px;
        }
      }
    </style>
  </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-custom">
            <div class="container-fluid">
              <a class="navbar-brand" href="#">
                <img src="{{ url_for('static', filename='santo_petrus_rasul.jpg') }}" alt="logo" style="height: 30px; width: auto; border-radius: 50%; margin-right: 8px;">
                WFF
              </a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav w-100 mb-2 mb-lg-0">
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/">Home</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="galang">Galang Dana</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="Jadwal">Jadwal</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="tentang">Tentang kami</a>
                  </li>
                  <li class="nav-item ms-auto d-flex align-items-center">
                    <div class="search-wrapper me-2">
                      <i class="fa fa-search search-icon" onclick="toggleSearch()"></i>
                      <input class="search-input" type="text" id="searchInput" placeholder="Search..." />
                    </div>
                  </li>
                  <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="font-size: 1.5rem; line-height: 1;">
                      ☰
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                      <li><a class="dropdown-item" href="login">Login</a></li>
                      <li><a class="dropdown-item" href="user">User</a></li>
                      <li><a class="dropdown-item" href="view">View</a></li>
                      <li><hr class="dropdown-divider"></li>
                      <li><a class="dropdown-item" href="logout">Logout</a></li>
                    </ul>
                  </li>
                </ul>
              </div>
            </div>
        </nav>
        {% block content %}
        {% endblock %}
        <script>
          function toggleSearch() {
            const input = document.getElementById('searchInput');
            input.classList.toggle('open');
            if (input.classList.contains('open')) {
              input.focus();
            }
          }
          document.getElementById('searchInput').addEventListener('blur', function() {
            if (this.value === '') {
              this.classList.remove('open');
            }
          });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    </body>
</html>
